<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- SPEKD — Elegant "S" monogram on warm dark ground -->
  <defs>
    <linearGradient id="warmGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4ba94"/>
      <stop offset="50%" stop-color="#c4a882"/>
      <stop offset="100%" stop-color="#b8960c"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a251f"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>
  </defs>

  <!-- Background — rounded square, warm dark -->
  <rect width="800" height="800" rx="160" fill="url(#bgGrad)"/>

  <!-- Subtle border — embossed feel -->
  <rect x="4" y="4" width="792" height="792" rx="156" stroke="#3d3730" stroke-width="4" fill="none"/>

  <!-- Inner architectural ring -->
  <circle cx="400" cy="400" r="300" stroke="url(#warmGold)" stroke-width="2.5" fill="none" opacity="0.25"/>

  <!-- The "S" letterform — warm gold -->
  <path d="M 340 280
           C 340 280, 280 280, 280 320
           C 280 360, 340 370, 400 380
           C 460 390, 520 400, 520 440
           C 520 480, 460 520, 400 520
           C 340 520, 300 500, 280 480"
        stroke="url(#warmGold)"
        stroke-width="30"
        stroke-linecap="round"
        fill="none"/>

  <!-- Top serif -->
  <line x1="340" y1="280" x2="460" y2="280" stroke="url(#warmGold)" stroke-width="30" stroke-linecap="round" opacity="0.9"/>

  <!-- Bottom serif -->
  <line x1="340" y1="520" x2="460" y2="520" stroke="url(#warmGold)" stroke-width="30" stroke-linecap="round" opacity="0.9"/>

  <!-- Diamond accent -->
  <rect x="390" y="572" width="20" height="20" rx="3" fill="url(#warmGold)" opacity="0.45" transform="rotate(45, 400, 582)"/>
</svg>
