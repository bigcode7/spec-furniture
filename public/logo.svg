<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- Elegant "S" monogram mark for SPEKD — inspired by architectural drafting and furniture curves -->
  <defs>
    <linearGradient id="warmGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4BA94"/>
      <stop offset="50%" stop-color="#C8A97E"/>
      <stop offset="100%" stop-color="#B8955F"/>
    </linearGradient>
    <linearGradient id="subtleGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A97E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C8A97E" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Outer circle — thin architectural ring -->
  <circle cx="400" cy="400" r="340" stroke="url(#warmGold)" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- Inner minimal frame — like a floor plan or spec sheet border -->
  <rect x="200" y="200" width="400" height="400" rx="8" stroke="url(#warmGold)" stroke-width="2" fill="none" opacity="0.15"/>

  <!-- The "S" letterform — elegant, serif-inspired, like a furniture curve -->
  <path d="M 340 280
           C 340 280, 280 280, 280 320
           C 280 360, 340 370, 400 380
           C 460 390, 520 400, 520 440
           C 520 480, 460 520, 400 520
           C 340 520, 300 500, 280 480"
        stroke="url(#warmGold)"
        stroke-width="28"
        stroke-linecap="round"
        fill="none"/>

  <!-- Top serif detail -->
  <line x1="340" y1="280" x2="460" y2="280" stroke="url(#warmGold)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>

  <!-- Bottom serif detail -->
  <line x1="340" y1="520" x2="460" y2="520" stroke="url(#warmGold)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>

  <!-- Small diamond accent — like a spec sheet marker -->
  <rect x="390" y="570" width="20" height="20" rx="3" fill="url(#warmGold)" opacity="0.5" transform="rotate(45, 400, 580)"/>
</svg>
