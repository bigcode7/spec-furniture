<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <rect width="200" height="200" rx="40" fill="#0A0A0F"/>

  <!-- Geometric S mark built from two arcs -->
  <path d="M 125 65
           A 35 35 0 0 0 65 65
           A 35 35 0 0 0 100 100
           A 35 35 0 0 1 135 135
           A 35 35 0 0 1 75 135"
        stroke="url(#goldGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Accent diamond -->
  <circle cx="152" cy="52" r="8" fill="url(#goldGrad)"/>

  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="50%" stop-color="#E8D5A8"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>
</svg>
